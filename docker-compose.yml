services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "18789:18789"
    volumes:
      - ~/.openclaw:/home/node/.openclaw
      - ~/openclaw/workspace:/home/node/workspace
      - ./:/home/node/trading-plugin
      - ./docker/entrypoint.sh:/home/node/entrypoint.sh
    entrypoint: /home/node/entrypoint.sh
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - PLUGIN_MQTT_BROKER_URL=${MQTT_BROKER_URL}
      - PLUGIN_MQTT_PORT=${MQTT_PORT}
      - PLUGIN_MQTT_USERNAME=${MQTT_USERNAME}
      - PLUGIN_MQTT_PASSWORD=${MQTT_PASSWORD}
